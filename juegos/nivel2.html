<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nivel 2 💜</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:Poppins,sans-serif;

color:white;

background:

radial-gradient(circle at top,
#e0aaff,
#5a189a,
#10002b);


}



.container{

width:95%;

max-width:1100px;

padding:35px;

text-align:center;

background:

rgba(255,255,255,.15);

border-radius:35px;

backdrop-filter:blur(20px);

}



h1{

font-family:'Great Vibes';

font-size:85px;

text-shadow:0 0 30px white;

}



h2{

font-size:35px;

margin-bottom:10px;

}



p{

font-size:18px;

}



.info{

font-size:25px;

margin:20px;

}




.board{


display:grid;

grid-template-columns:

repeat(6,1fr);


gap:12px;

max-width:850px;

margin:auto;


}



.card{

height:110px;

cursor:pointer;

perspective:800px;


}



.inner{


height:100%;

width:100%;

position:relative;

transform-style:preserve-3d;

transition:.5s;


}



.card.flip .inner{

transform:rotateY(180deg);

}



.front,
.back{


position:absolute;

width:100%;

height:100%;

border-radius:18px;

display:flex;

justify-content:center;

align-items:center;

backface-visibility:hidden;


}



.front{


background:

linear-gradient(
135deg,
#9d4edd,
#e0aaff
);


font-size:40px;

box-shadow:

0 0 15px #e0aaff;


}



.back{


background:white;

transform:rotateY(180deg);

font-size:45px;

}



button{

margin-top:25px;

padding:15px 40px;

border:0;

border-radius:50px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:

linear-gradient(
135deg,
#e0aaff,
white
);

color:#240046;


}



#message{

font-size:25px;

margin-top:20px;

}



@media(max-width:700px){

.board{

grid-template-columns:
repeat(4,1fr);

}


.card{

height:80px;

}


.front,
.back{

font-size:30px;

}


}


</style>

</head>


<body>


<div class="container">


<h1>
💜 Nivel 02
</h1>


<h2>
Memoria de nuestro amor
</h2>


<p>
Encuentra todas las parejas escondidas ✨
</p>


<div class="info">

Parejas encontradas:

<span id="count">
0
</span>

/18

</div>



<div class="board" id="board">

</div>



<div id="message">

</div>



<a href="../index.html">

<button>
← Volver al mapa
</button>

</a>


</div>





<script>


const simbolos=[


"💜",
"❤️",
"🌹",
"💌",
"💍",
"⭐",
"🦋",
"🫶",
"✨",
"🌙",
"🧸",
"🍫",
"🎁",
"💕",
"💖",
"🌸",
"🥰",
"😘"


];



// Crear 18 parejas

let cartas=[

...simbolos,

...simbolos

];



// Mezclar

cartas.sort(
()=>Math.random()-0.5
);



const board=
document.getElementById("board");



let primera=null;

let segunda=null;

let bloqueo=false;

let parejas=0;





cartas.forEach(icono=>{


let carta=
document.createElement("div");


carta.className="card";


carta.innerHTML=`

<div class="inner">


<div class="front">

💜

</div>


<div class="back">

${icono}

</div>


</div>

`;



board.appendChild(carta);





carta.onclick=()=>{


if(bloqueo)
return;



if(carta===primera)
return;



carta.classList.add("flip");



if(!primera){


primera=carta;

return;

}



segunda=carta;



let valor1=
primera.querySelector(".back").innerHTML;


let valor2=
segunda.querySelector(".back").innerHTML;




if(valor1===valor2){


parejas++;


document.getElementById("count")
.innerHTML=parejas;



primera=null;

segunda=null;



if(parejas===18){

ganar();

}



}



else{


bloqueo=true;



setTimeout(()=>{


primera.classList.remove("flip");

segunda.classList.remove("flip");


primera=null;

segunda=null;


bloqueo=false;


},900);


}



};



});






function ganar(){


document.getElementById("message").innerHTML=

`

✨ ¡Nivel completado! ✨

<br><br>

Encontraste los 18 recuerdos de nuestro amor 💜

<br>

Cada símbolo representa algo bonito de nosotros 🌹

`;



localStorage.setItem(
"nivel2",
"completo"
);



}



</script>


</body>

</html>
