<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nivel 3 💜</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:'Poppins',sans-serif;

color:white;


background:

radial-gradient(circle at top,
#e0aaff,
#5a189a,
#10002b);


}



.container{

width:90%;

max-width:850px;

padding:40px;

text-align:center;


background:

rgba(255,255,255,.15);


border-radius:35px;


backdrop-filter:blur(20px);


box-shadow:

0 0 50px rgba(0,0,0,.4);


}



h1{

font-family:'Great Vibes';

font-size:90px;

text-shadow:

0 0 30px white;


}



h2{

font-size:35px;

margin:15px;


}



.question{

font-size:25px;

margin:30px;


}



.options{

display:grid;

gap:15px;


}



.option{


padding:18px;


border-radius:30px;


background:

rgba(255,255,255,.2);


cursor:pointer;


font-size:18px;


transition:.3s;


}



.option:hover{

transform:scale(1.05);

background:#e0aaff;

color:#240046;


}




.progress{


height:20px;

background:

rgba(255,255,255,.2);


border-radius:20px;

overflow:hidden;

margin:25px;


}




.bar{


height:100%;


width:0%;


background:

linear-gradient(
90deg,
#e0aaff,
white
);


transition:.5s;


}



.score{

font-size:25px;

margin-top:20px;


}




#message{

font-size:25px;

margin-top:25px;


}




button{


margin-top:30px;


padding:15px 40px;


border:none;


border-radius:50px;


font-size:18px;


font-weight:bold;


cursor:pointer;


background:

linear-gradient(
135deg,
#e0aaff,
white
);


color:#240046;


}



button:hover{

transform:scale(1.1);

}



</style>

</head>


<body>


<div class="container">


<h1>
🌹 Nivel 03
</h1>


<h2>
¿Cuánto conoces nuestro amor?
</h2>



<div class="progress">

<div class="bar" id="bar"></div>

</div>




<div class="question" id="question">

</div>



<div class="options" id="options">

</div>



<div class="score">

💜 Puntaje:

<span id="score">
0
</span>

</div>



<div id="message">

</div>




<a href="../index.html">

<button>

← Volver al mapa

</button>

</a>



</div>





<script>


const preguntas=[


{

pregunta:

"💜 ¿Qué día celebramos nuestro aniversario?",


opciones:[

"14 de febrero ❤️",

"19 de febrero 💜",

"12 de marzo 🌹"

],


correcta:1

},




{

pregunta:

"💜 ¿Cuál es el color que más te gusta?",


opciones:[

"Azul 💙",

"Rosado 🌸",

"Morado 💜"

],


correcta:2

},




{

pregunta:

"🎬 ¿Cuál fue nuestro primer recuerdo?",


opciones:[

"La película Dumbo 🐘",

"Una cena especial 🍽️",

"Un paseo juntos 🌹"

],


correcta:0

},




{

pregunta:

"💌 ¿Qué es lo más importante de nuestra historia?",


opciones:[

"Los momentos que vivimos juntos 💜",

"Los regalos",

"Las fotos"

],


correcta:0

},




{

pregunta:

"✨ ¿Qué quiero seguir creando contigo?",


opciones:[

"Nuevos recuerdos y aventuras ❤️",

"Nada especial",

"Solo mensajes"

],


correcta:0

}



];




let actual=0;

let puntos=0;



const pregunta =
document.getElementById("question");


const opciones =
document.getElementById("options");


const barra =
document.getElementById("bar");


const score =
document.getElementById("score");






function cargarPregunta(){


if(actual >= preguntas.length){

finalizar();

return;

}



let p=preguntas[actual];



pregunta.innerHTML=p.pregunta;



opciones.innerHTML="";




p.opciones.forEach((texto,index)=>{


let boton=document.createElement("div");


boton.className="option";


boton.innerHTML=texto;



boton.onclick=()=>{


responder(index);


};



opciones.appendChild(boton);



});



barra.style.width=

(actual/preguntas.length*100)+"%";



}





function responder(respuesta){



if(respuesta === preguntas[actual].correcta){


puntos++;


score.innerHTML=puntos;


}



actual++;


cargarPregunta();


}






function finalizar(){


barra.style.width="100%";


pregunta.innerHTML=

"✨ Nivel completado ✨";



opciones.innerHTML="";



document.getElementById("message").innerHTML=

`

💜 Guñi, conoces nuestra historia

<br><br>

Tu puntaje fue:

${puntos}/5

<br><br>

Has desbloqueado la última sorpresa 🎁

`;



localStorage.setItem(
"nivel3",
"completo"
);



}



cargarPregunta();



</script>



</body>

</html>
