<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nivel 1 💜</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');


*{

margin:0;
padding:0;
box-sizing:border-box;

}


body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:'Poppins',sans-serif;

color:white;


background:

radial-gradient(circle at top,
#c77dff,
#5a189a 45%,
#10002b);


overflow:hidden;

}




.container{


width:90%;

max-width:900px;

text-align:center;

padding:40px;


background:

rgba(255,255,255,.15);


border-radius:35px;


backdrop-filter:blur(20px);


box-shadow:

0 0 50px rgba(0,0,0,.4);


}



h1{


font-family:'Great Vibes';

font-size:90px;

text-shadow:

0 0 25px white;


}



h2{

font-size:35px;

margin:10px;

}



p{

font-size:18px;

}



.score{


font-size:25px;

margin:25px;


}



#gameArea{


height:400px;

position:relative;

overflow:hidden;


border-radius:30px;


background:

rgba(255,255,255,.12);


border:

1px solid rgba(255,255,255,.3);


}





.heart{


position:absolute;

font-size:45px;

cursor:pointer;


animation:

caer 5s linear;


}




@keyframes caer{


from{

transform:
translateY(-50px)
rotate(0deg);

}


to{

transform:
translateY(450px)
rotate(360deg);

}


}




button{


margin-top:25px;

padding:15px 40px;

border:none;

border-radius:50px;


font-size:18px;

font-weight:bold;


cursor:pointer;


color:#240046;


background:

linear-gradient(
135deg,
#e0aaff,
white
);



box-shadow:

0 0 25px #e0aaff;


transition:.3s;


}



button:hover{


transform:scale(1.1);


}



a{

text-decoration:none;

}



#message{


font-size:25px;

margin-top:20px;


}




</style>


</head>


<body>



<div class="container">


<h1>
💜 Nivel 01
</h1>


<h2>
Atrapa nuestros corazones
</h2>


<p>
Atrapa 10 corazones para desbloquear nuestro primer recuerdo ✨
</p>



<div class="score">

💜 Corazones:

<span id="score">

0

</span>

/10


</div>




<div id="gameArea">


</div>



<div id="message">

</div>




<a href="../index.html">

<button>

← Volver al mapa

</button>

</a>



</div>





<script>


let puntos=0;


const area=
document.getElementById("gameArea");


const contador=
document.getElementById("score");


const mensaje=
document.getElementById("message");





function crearCorazon(){



let corazon=
document.createElement("div");



corazon.className="heart";


corazon.innerHTML="💜";



corazon.style.left=
Math.random()*90+"%";



corazon.style.top="-50px";



area.appendChild(corazon);




corazon.onclick=function(){



puntos++;


contador.innerHTML=puntos;



corazon.remove();



if(puntos>=10){


ganar();


}


};





setTimeout(()=>{


if(corazon){

corazon.remove();

}


},5000);



}






let juego=setInterval(()=>{


crearCorazon();


},700);






function ganar(){



clearInterval(juego);



area.innerHTML="";



mensaje.innerHTML=`

✨ ¡Misión completada! ✨

<br><br>

Has atrapado 10 corazones de nuestro amor 💜

<br><br>

Tu primer recuerdo está desbloqueado 🌹

<br>

`;



localStorage.setItem(
"nivel1",
"completo"
);



}



</script>


</body>

</html>
